apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: voterflow-ai-production
  namespace: default
  annotations:
    run.googleapis.com/launch-stage: BETA
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
      - image: gcr.io/voterflow-ai/web-app:latest
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
        ports:
        - name: http1
          containerPort: 80
        env:
        - name: VITE_GEMINI_API_KEY
          value: "PROJECT_SECRET_KEY"
        - name: VITE_FIREBASE_CONFIG
          value: "PROJECT_FIREBASE_JSON"
